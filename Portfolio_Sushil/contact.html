<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Sushil Bhattarai</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="loader" class="preloader">
        <div class="loader-content">
            <div class="loader-logo">SUSHIL<span>.SYS</span></div>
            <div class="loader-bar">
                <div class="loader-progress"></div>
            </div>
        </div>
    </div>

    <div class="cursor-glow" id="cursorGlow"></div>
    
    <nav>
        <div class="nav-container">
            <div class="logo">SUSHIL<span>.SYS</span></div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="projects.html">Projects</a>
                <a href="contact.html" class="btn-primary">Hire Me</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <section class="contact-section reveal" style="padding-top: 10rem;">
            <div class="form-container">
                <h2>Let's Build Together</h2>
                <p style="color: var(--text-dim); margin-bottom: 2rem;">Currently based in Mississauga, ON. Available for worldwide collaborations.</p>
                
                <form id="contactForm">
                    <input type="text" id="name" placeholder="Name" required>
                    <input type="email" id="email" placeholder="Email" required>
                    <textarea id="message" placeholder="Your Message" rows="4" required></textarea>
                    
                    <button type="submit" id="submitBtn">
                        <span>Send Message</span>
                        <i data-lucide="send" size="18"></i>
                    </button>
                </form>

                <div class="contact-socials">
                    <a href="mailto:bhattraisucil@gmail.com" title="Email"><i data-lucide="mail"></i></a>
                    <a href="https://www.linkedin.com/in/sucilbhattrai/" target="_blank" title="LinkedIn"><i data-lucide="linkedin"></i></a>
                    <a href="https://www.instagram.com/sushil_sys/" target="_blank" title="Instagram"><i data-lucide="instagram"></i></a>
                </div>
                
                <div id="toast" class="hidden" style="margin-top: 2rem; color: #4ade80;">
                    ✓ Message sent successfully!
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
